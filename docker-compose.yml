version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=TuPassword123!
    ports:
      - "1433:1433"
    volumes:
      - ./sql-scripts:/sql-scripts
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "TuPassword123!" -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5